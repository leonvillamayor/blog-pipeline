<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>blog-pipeline · {{ settings.blog_repo }}</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"
    integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
    crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>blog-pipeline</h1>
    <div class="meta">
      <span>{{ settings.blog_repo }}</span>
      <span class="dot">·</span>
      <span>refresh cada {{ settings.refresh_interval_seconds }}s</span>
      <span class="dot">·</span>
      <button hx-get="/board" hx-target="#board-root" hx-swap="innerHTML">refresh</button>
    </div>
  </header>

  <main id="board-root">
    {% include "partials/board.html" %}
  </main>

  <footer>
    <small>blog-pipeline v0.1.0</small>
  </footer>

  <script>
    /* Filtro client-side: oculta artículos cuyo slug/title no coincida. */
    function filterArticles(query) {
      const q = (query || '').trim().toLowerCase();
      const articles = document.querySelectorAll('.article[data-slug]');
      articles.forEach(el => {
        if (!q) {
          el.style.display = '';
          return;
        }
        const slug = (el.dataset.slug || '').toLowerCase();
        const title = (el.dataset.title || '').toLowerCase();
        el.style.display = (slug.includes(q) || title.includes(q)) ? '' : 'none';
      });
    }

    /* Listener para evento custom 'board-refresh' (fired por la respuesta
       de las acciones via HX-Trigger header): recarga el board partial
       tras 6s para dar tiempo a GitHub a procesar. */
    document.body.addEventListener('board-refresh', () => {
      setTimeout(() => {
        htmx.ajax('GET', '/board', {target: '#board-root', swap: 'innerHTML'});
      }, 6000);
    });
  </script>
</body>
</html>
